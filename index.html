<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy: Time Machine Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Jeopardy</h1>
        <div id="game-status" style="display: none;">
            <div class="score-display">$<span id="score">0</span></div>
        </div>
    </header>

    <main class="setup-container" id="setup-screen">
        <h2>Choose Your Era</h2>
        <p>Select a time range to play with questions from those years.</p>

        <div class="range-selectors">
            <div class="selector-group">
                <label>Start Year</label>
                <select id="start-year">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="selector-group">
                <label>End Year</label>
                <select id="end-year">
                    <!-- Populated by JS -->
                </select>
            </div>
        </div>

        <button class="btn-primary" id="start-game-btn">Start Game</button>
        <p id="loading-txt" style="display: none; margin-top: 1rem; color: var(--jeopardy-gold);">Loading questions...
        </p>
    </main>

    <div class="game-container" id="round-intro-container"
        style="display: none; text-align: center; animation: fadeIn 0.8s ease-out;">
        <h2 id="intro-round-name"
            style="color: var(--jeopardy-gold); letter-spacing: 4px; font-size: 2rem; margin-bottom: 2rem;">ROUND NAME
        </h2>
        <div class="category-card"
            style="margin: 0 auto; max-width: 600px; height: auto; min-height: 200px; margin-bottom: 3rem;">
            <div class="cat-name" id="intro-category-name" style="font-size: 2.5rem;">CATEGORY NAME</div>
            <div class="cat-year" id="intro-category-year" style="font-size: 1.2rem; margin-top: 1rem;">YEAR</div>
        </div>
        <button class="btn-primary" id="start-clues-btn">Continue</button>
    </div>

    <div class="game-container" id="clue-container" style="display: none; animation: fadeIn 0.4s ease-out;">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 0 1rem;">
            <div style="text-transform: uppercase; color: var(--jeopardy-gold); font-weight: bold; font-size: 1.2rem;"
                id="clue-category-display">CATEGORY</div>
            <div style="font-size: 1.5rem; font-weight: 900;" id="clue-value-display">$0</div>
        </div>

        <div class="clue-display"
            style="background: rgba(0,0,0,0.4); border: 1px solid var(--glass-accent); border-radius: 16px;">
            <div class="clue-progress" id="clue-progress"
                style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 1rem;">Clue 1
                of 5</div>
            <div class="clue-text" id="active-clue" style="text-align: center;">THE CONTENT OF THE CLUE GOES HERE.</div>

            <div class="answer-text" id="active-answer"
                style="border-top: 1px solid var(--glass-accent); padding-top: 1.5rem; text-align: center;">
                <div
                    style="font-size: 0.9rem; text-transform: uppercase; color: var(--jeopardy-gold); margin-bottom: 0.5rem;">
                    The Clue:</div>
                <div id="active-answer-text">What is the Answer?</div>
            </div>

            <div style="margin-top: 3rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
                <button class="btn-primary btn-pass" id="pass-btn">Pass</button>
                <button class="btn-primary btn-guess" id="guess-btn">Guess</button>

                <button class="btn-primary btn-incorrect" id="incorrect-btn" style="display: none;">Incorrect</button>
                <button class="btn-primary btn-correct" id="correct-btn" style="display: none;">Correct</button>

                <button class="btn-primary" id="continue-clue-btn"
                    style="display: none; background: #3498db; color: white;">Continue</button>
            </div>
        </div>
    </div>

    <!-- Container for Final Jeopardy Wager (reused existing logic in JS to inject into this) -->
    <div class="game-container" id="final-jeopardy-container" style="display: none;">
        <div class="board" id="final-board">
            <!-- Injected by JS -->
        </div>
    </div>

    <div class="game-container setup-container" id="round-complete-container" style="display: none; margin-top: 4rem;">
        <h2 style="color: var(--jeopardy-gold); font-size: 2.5rem; margin-bottom: 1rem;">Round Complete!</h2>
        <div style="font-size: 1.5rem; margin-bottom: 2rem;">Current Score: $<span id="round-complete-score">0</span>
        </div>
        <button class="btn-primary" id="next-round-seq-btn">Next Round</button>
    </div>

    <div class="game-container" id="end-game-container" style="display: none;">
        <!-- Injected by JS -->
    </div>


    <script src="game.js"></script>
</body>

</html>
